<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Merge Sort Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main">

    <h1>MERGE SORT VISUALIZER</h1>

    <div class="top-panel">

      <div class="input-box">
        <label>Enter Array</label>
        <input type="text" id="arrayInput"
        placeholder="Example: 8,3,5,1,9,6">
      </div>

      <div class="input-box">
        <label>Animation Speed</label>
        <select id="speed">
          <option value="1000">Slow</option>
          <option value="500" selected>Medium</option>
          <option value="150">Fast</option>
        </select>
      </div>

      <div class="input-box">
        <label>Bar Color</label>
        <select id="color">
          <option value="#00e5ff">Cyan</option>
          <option value="#00ff88">Green</option>
          <option value="#ff9800">Orange</option>
          <option value="#ff1744">Red</option>
          <option value="#ffffff">White</option>
        </select>
      </div>

    </div>

    <div class="button-panel">

      <button onclick="generateBars()">Generate</button>

      <button onclick="startMergeSort()">Start Merge Sort</button>

      <button onclick="resetVisualizer()">Reset</button>

    </div>

    <div id="bars-container"></div>

    <div class="bottom-panel">

      <div class="card">
        <h2>Current Status</h2>
        <p id="status">Waiting for input...</p>
      </div>

      <div class="card">
        <h2>Sorted Output</h2>
        <p id="output">-</p>
      </div>

      <div class="card">
        <h2>Time Complexity</h2>
        <p>Best : O(n log n)</p>
        <p>Average : O(n log n)</p>
        <p>Worst : O(n log n)</p>
      </div>

    </div>

  </div>

<script src="script.js"></script>

</body>
</html>
